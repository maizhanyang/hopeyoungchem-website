          - generic [ref=e80]:
            - paragraph [ref=e81]: 当你通过公开电话、商务邮箱或业务微信联系虹扬时，沟通中提供的姓名、公司、职位、项目方向、样品需求和资料需求，主要用于销售与技术团队跟进项目、安排资料和样品沟通。
            - paragraph [ref=e82]: 若后续项目进入更深层技术或商务流程，双方再根据实际需要通过邮件、会议或项目文件继续确认资料边界。
        - article [ref=e83]:
          - heading "联系表单当前只做本地整理，不自动入库" [level=3] [ref=e84]
          - generic [ref=e85]:
            - paragraph [ref=e86]: 站内联系表单目前不会把内容自动发送到服务器，也不会直接写入在线数据库。它的作用是帮助访客在浏览器里整理咨询文本，并复制后自行发送给业务联系人。
            - paragraph [ref=e87]: 因此，是否继续通过邮件、微信或电话提交信息，仍由访客主动决定。建议只填写与当前项目判断相关的必要信息。
        - article [ref=e88]:
          - heading "更正、撤回或更新方式" [level=3] [ref=e89]
          - generic [ref=e90]:
            - paragraph [ref=e91]: 如果你已经通过电话、邮箱或微信提交了资料，并希望更正联系人信息、补充项目信息或撤回明显填写错误的内容，可以继续通过公开商务邮箱或电话与我们联系。
            - paragraph [ref=e92]: 随着正式版继续上线，若网站实际启用新的数据接入方式，本页会按真实情况补充更新。
      - paragraph [ref=e93]: 当前更需要你们后续补充的，不是模板式隐私条款，而是正式上线时的域名、备案号、企业微信公开方式，以及是否启用真正的资料申请系统。
