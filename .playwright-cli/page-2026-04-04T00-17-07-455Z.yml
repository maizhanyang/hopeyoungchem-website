          - generic [ref=e71]:
            - paragraph [ref=e72]: 目前站点不提供会员注册、在线下单、支付、投标或下载中心账号体系。浏览者访问公开页面时，不需要提交身份证号、营业执照扫描件或其他敏感个人信息。
            - paragraph [ref=e73]: 网站的静态访问会由浏览器和网络环境自然产生基础技术信息，例如页面请求、设备类型和访问时间。这类信息主要用于页面正常展示、基础安全和后续运维判断。
